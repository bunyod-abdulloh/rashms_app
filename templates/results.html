{% extends 'base.html' %}
{% load static %}

{% block title %}Natijalar{% endblock %}
{% block top_title %}
<span class="title-icon">
    <i class="bi bi-trophy-fill"></i>
</span>
<span class="title-text">Test natijalari</span>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/result.css' %}?v={{ APP_VERSION }}">
{% endblock %}

{% block content %}
<div class="results-wrapper">

    <!-- Hero -->
    <div class="result-hero">
        <div class="result-icon" id="result-icon">
            <i class="bi bi-trophy-fill"></i>
        </div>
        <h1 class="result-title" id="result-title">Natijalar tayyor!</h1>
        <p class="result-subtitle" id="result-subtitle">Test yakunlandi</p>
    </div>

    <!-- Summary (JS to'ldiradi) -->
    <div id="summary"></div>

    <!-- Savollar ro'yxati -->
    <div class="results-list-wrap">
        <div class="results-list-title">
            <i class="bi bi-list-check"></i>
            Savol javoblari
        </div>
        <div id="results-container"></div>
    </div>

    <!-- Yopish tugmasi -->
    <button class="close-btn" id="close-btn">
        <i class="bi bi-house-fill"></i>
        Bosh sahifaga qaytish
    </button>
</div>


<script type="module" src="{% static 'js/result.js' %}?v={{ APP_VERSION }}"></script>

{% endblock %}
