{% extends 'admin/main.html' %}
{% load static %}

{% block title %}Test qo'shish{% endblock %}
{% block top_title %}✨ Test qo'shish{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/add-test.css' %}?v={{ APP_VERSION }}">
{% endblock %}

{% block content %}
<div class="container">

    <!-- Kirish kartochkasi: FAN + TEST KODI + PROGRESS -->
    <div class="glass-card mb-4 fade-in-up" style="animation-delay: 0.1s;">
        <div class="row g-3 align-items-end">
            <!-- Fan tanlash -->
            <div class="col-md-5">
                <label for="test-subject" class="form-label">
                    <i class="bi bi-book-fill"></i> Fan
                </label>
                <select id="test-subject" class="form-select">
                    <option value="" disabled selected>Fanni tanlang...</option>
                    <option value="history">📚 Tarix</option>
                    <option value="uzbek">📖 Ona tili va adabiyot</option>
                    <option value="russian">🇷🇺 Rus tili</option>
                </select>
            </div>

            <!-- Test kodi -->
            <div class="col-md-5">
                <label for="test-code" class="form-label">
                    <i class="bi bi-key-fill"></i> Test kodi
                </label>
                <input id="test-code" type="text" class="form-control"
                       placeholder="T2025-01" autocomplete="off" maxlength="30">
            </div>

            <!-- Progress ring -->
            <div class="col-md-2 d-flex justify-content-center">
                <div class="progress-ring" title="To'ldirilgan savollar">
                    <svg viewBox="0 0 64 64">
                        <circle class="bg" cx="32" cy="32" r="28"/>
                        <circle class="fg" cx="32" cy="32" r="28"/>
                    </svg>
                    <span class="label">0/0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Dinamik test tarkibi -->
    <div id="test-container" class="fade-in-up" style="animation-delay: 0.2s;">
        <!-- test_form.js orqali savollar shu yerga joylanadi -->
    </div>

    <!-- Saqlash tugmasi va status -->
    <div class="text-center">
        <button id="save-btn">
            <i class="bi bi-check-circle-fill me-2"></i>Saqlash
        </button>
        <div id="status"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script type="module" src="{% static 'js/add_test.js' %}?v={{ APP_VERSION }}"></script>
{% endblock %}
