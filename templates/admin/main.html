{% load static %}
<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sahifa{% endblock %}</title>

    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600&display=swap"
          rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- Yuqori navbar -->
<div class="top-navbar shadow-sm">
    {% block top_title %}Sahifa nomi{% endblock %}
</div>

<!-- Asosiy kontent -->
<main class="container">
    {% block content %}{% endblock %}
</main>

<!-- Pastki navbar -->
<div class="bottom-nav">
    <a href="{% url 'add-test' %}" data-tooltip="Ctrl+N">
        <i class="bi bi-plus-circle"></i>
        <span>Qo'shish</span>
    </a>
    <a href="{% url 'edit-test' %}">
        <i class="bi bi-pencil-square"></i>
        <span>O'zgartirish</span>
    </a>
    <a href="{% url 'delete-test' %}">
        <i class="bi bi-trash"></i>
        <span>O'chirish</span>
    </a>
    <a href="{% url 'on-test' %}">
        <i class="bi bi-toggle-on"></i>
        <span>Yoqish</span>
    </a>
    <a href="{% url 'off-test' %}">
        <i class="bi bi-toggle-off"></i>
        <span>To'xtatish</span>
    </a>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Premium effects (cursor spotlight, ripple, confetti, 3D tilt) -->
<script src="{% static 'js/premium-effects.js' %}?v={{ APP_VERSION }}"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
