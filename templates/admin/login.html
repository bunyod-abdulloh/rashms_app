{% load static %}
<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Premium design system -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin/login.css' %}">
</head>

<body class="login-page">

<div class="login-wrapper">
    <div class="login-card glass-card">

        <!-- 🔒 Yuqoridagi ikonka -->
        <div class="login-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <!-- Sarlavha -->
        <h1 class="login-title">Admin Panel</h1>
        <p class="login-subtitle">
            Boshqaruv paneliga kirish uchun ma'lumotlarni kiriting
        </p>

        <!-- Login formasi -->
        <form method="post" class="login-form" id="loginForm">
            {% csrf_token %}

            <!-- Login (username) -->
            <div class="form-field">
                <label class="form-label" for="username">
                    <i class="bi bi-person-fill"></i> Login
                </label>
                <div class="input-wrap">
                    <i class="bi bi-person input-icon"></i>
                    <input
                            id="username"
                            type="text"
                            name="username"
                            class="form-control has-icon"
                            placeholder="Admin loginni kiriting"
                            autocomplete="username"
                            autofocus
                            required>
                </div>
            </div>

            <!-- Parol -->
            <div class="form-field">
                <label class="form-label" for="password">
                    <i class="bi bi-lock-fill"></i> Parol
                </label>
                <div class="input-wrap">
                    <i class="bi bi-lock input-icon"></i>
                    <input
                            id="password"
                            type="password"
                            name="password"
                            class="form-control has-icon has-toggle"
                            placeholder="Parolni kiriting"
                            autocomplete="current-password"
                            required>
                    <button
                            type="button"
                            class="password-toggle"
                            id="togglePw"
                            title="Parolni ko'rsatish"
                            aria-label="Parolni ko'rsatish/yashirish">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <!-- Caps Lock ogohlantirish -->
                <span class="caps-warning" id="capsWarning">
                    <i class="bi bi-arrow-up-square-fill"></i>
                    Caps Lock yoqilgan
                </span>
            </div>

            <!-- Xato xabar -->
            {% if error %}
            <div class="login-error">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Kirish tugmasi -->
            <button type="submit" class="login-submit" id="loginBtn">
                <span class="btn-content">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Kirish
                </span>
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <span class="badge-mini">
                <i class="bi bi-shield-check"></i> Xavfsiz kirish
            </span>
        </div>

    </div>
</div>

<script>
    // =====================================================
    // 👁️ Parolni ko'rsatish / yashirish
    // =====================================================
    const togglePw = document.getElementById('togglePw');
    const passwordInput = document.getElementById('password');
    const toggleIcon = togglePw.querySelector('i');

    togglePw.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        toggleIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
        togglePw.title = isPassword ? "Parolni yashirish" : "Parolni ko'rsatish";
    });

    // =====================================================
    // ⌨️ Caps Lock aniqlash
    // =====================================================
    const capsWarning = document.getElementById('capsWarning');
    passwordInput.addEventListener('keydown', (e) => {
        const isCaps = e.getModifierState && e.getModifierState('CapsLock');
        capsWarning.classList.toggle('active', isCaps);
    });
    passwordInput.addEventListener('blur', () => {
        capsWarning.classList.remove('active');
    });

    // =====================================================
    // ⏳ Yuklanish holati (loading) submit'da
    // =====================================================
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', () => {
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;
    });

    // =====================================================
    // 🚫 Ctrl+S kabi bezovtaligiga yo'l qo'ymaslik
    // =====================================================
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
